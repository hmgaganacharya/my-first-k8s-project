apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-first-k8s-app
spec:
  replicas: 2 # This tells K8s to always keep 2 copies of your app running
  selector:
    matchLabels:
      app: web-app
  template:
    metadata:
      labels:
        app: web-app
    spec:
      containers:
        - name: my-python-container
          
          image: hmgagan/my-first-app:1.0
          ports:
            - containerPort: 5000