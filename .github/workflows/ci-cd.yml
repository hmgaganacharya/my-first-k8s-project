name: Build and Push to Docker Hub

# This tells GitHub: "Run this script every time I push to the main branch"
on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Download your code onto GitHub's server
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Log into your Docker Hub account using the secrets we saved
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Step 3: Build the Docker image and push it to the cloud automatically!
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # This automatically tags the image with 'latest'
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/my-first-app:latest